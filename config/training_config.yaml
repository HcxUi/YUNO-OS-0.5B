# ============================================================
# YUNO-LLM Training Configuration
# ============================================================

# ------------------------------------------------------------
# LoRA Configuration (Low-Rank Adaptation)
# ------------------------------------------------------------
lora:
  enabled: true
  r: 16                        # Rank — higher = more capacity, more memory
  lora_alpha: 32               # Scaling factor (alpha/r = effective LR scale)
  lora_dropout: 0.05
  bias: "none"                 # none | all | lora_only
  task_type: "CAUSAL_LM"
  target_modules:              # Qwen3 attention projection layers
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

# ------------------------------------------------------------
# SFT Training Hyperparameters
# ------------------------------------------------------------
training:
  output_dir: "checkpoints/sft_run_001"
  num_train_epochs: 3
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  max_seq_length: 512
  fp16: false
  bf16: false
  logging_steps: 5
  eval_steps: 25
  save_steps: 50
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  report_to: "none"
  dataloader_num_workers: 0

# ------------------------------------------------------------
# Dataset Configuration
# ------------------------------------------------------------
dataset:
  train_file: "datasets/train.jsonl"
  eval_file: "datasets/eval.jsonl"
  train_split_ratio: 0.95
  dedup: true
  shuffle: true
  seed: 42

# ------------------------------------------------------------
# Optimizer
# ------------------------------------------------------------
optimizer:
  name: "adamw_torch"
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0

# ------------------------------------------------------------
# Quantization (for low-VRAM GPUs)
# ------------------------------------------------------------
quantization:
  load_in_4bit: false
  load_in_8bit: false
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_use_double_quant: true
